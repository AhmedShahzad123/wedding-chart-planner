[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/parse-guests"
  to = "/.netlify/functions/parse-guests"
  status = 200

[[redirects]]
  from = "/api/ai-status"
  to = "/.netlify/functions/ai-status"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
