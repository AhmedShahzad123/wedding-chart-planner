[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.19.4"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@sparticuz/chromium", "puppeteer-core"]
  included_files = ["node_modules/@sparticuz/chromium/bin/**", "public/fonts/**"]

[[redirects]]
  from = "/api/parse-guests"
  to = "/.netlify/functions/parse-guests"
  status = 200

[[redirects]]
  from = "/api/generate-pdf"
  to = "/.netlify/functions/generate-pdf"
  status = 200

[[redirects]]
  from = "/api/ai-status"
  to = "/.netlify/functions/ai-status"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
